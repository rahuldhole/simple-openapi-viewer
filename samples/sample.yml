openapi: 3.0.3
info:
  title: Simple OpenAPI Viewer Sample
  version: 1.0.0
  description: A sample OpenAPI definition for the Simple OpenAPI Viewer extension.
servers:
  - url: https://api.example.com/v1
paths:
  /pets:
    get:
      summary: List all pets
      responses:
        '200':
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
